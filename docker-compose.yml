services:
  opays-vitrine:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_SITE_ORIGIN: ${VITE_SITE_ORIGIN:-https://www.opays.io}
    container_name: opays-vitrine
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
