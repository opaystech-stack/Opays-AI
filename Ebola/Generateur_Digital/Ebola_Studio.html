<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TUCHUNGUZE II — Studio Affiches Digitales</title>
  <script src="html2canvas.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,400;0,500;0,700;0,800;0,900;1,700;1,800;1,900&family=Inter:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* ============================================================
       1. VARIABLES & RESET
       ============================================================ */
    :root {
      --blue: #0f62a9;
      --blue-dark: #0b3470;
      --cyan: #11a9d9;
      --yellow: #ffdd24;
      --red: #e6313e;
      --red-dark: #b71c1c;
      --green: #168640;
      --green-dark: #1B5E20;
      --ink: #172033;
      --muted: #667085;
      --ui: #e5e7eb;
      --paper: #ffffff;
      --sb: #0f172a;
      --sb-border: #334155;
      --sb-input: #1e293b;
      --font: 'Inter', system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      --display: 'Montserrat', "Bahnschrift", "Segoe UI", "Arial Narrow", sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    body {
      height: 100vh;
      display: grid;
      grid-template-columns: 440px minmax(0, 1fr);
      gap: 16px;
      padding: 16px;
      background: #111827;
      color: #f1f5f9;
      font-family: var(--font);
      font-size: 14px;
    }

    /* ============================================================
       2. SIDEBAR
       ============================================================ */
    .sidebar {
      background: var(--sb);
      border: 1px solid var(--sb-border);
      border-radius: 12px;
      padding: 20px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .sidebar::-webkit-scrollbar { width: 6px; }
    .sidebar::-webkit-scrollbar-thumb { background: #475569; border-radius: 3px; }
    .sidebar::-webkit-scrollbar-track { background: transparent; }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      padding-bottom: 16px;
      border-bottom: 2px solid var(--red);
    }
    .brand img { width: 48px; height: 48px; object-fit: contain; }
    .brand h1 {
      font-size: 1.1rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #fff;
    }
    .brand h1 em { font-style: normal; color: var(--red); }
    .brand .badge {
      margin-left: auto;
      background: var(--red);
      color: #fff;
      padding: 3px 10px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: 900;
      letter-spacing: 1px;
    }

    .section-title {
      font-size: .7rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--red);
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .section-title::before {
      content: '';
      width: 8px;
      height: 8px;
      background: var(--red);
      border-radius: 2px;
      display: inline-block;
    }

    .form-section {
      background: rgba(255,255,255,0.02);
      border: 1px solid var(--sb-border);
      border-radius: 8px;
      padding: 14px;
    }

    .form-group { margin-bottom: 12px; }
    .form-group:last-child { margin-bottom: 0; }
    .form-row { display: flex; gap: 10px; }
    .form-row > * { flex: 1; min-width: 0; }
    label {
      display: block;
      font-size: .78rem;
      font-weight: 700;
      color: #94a3b8;
      margin-bottom: 5px;
    }
    select, input[type="text"], input[type="file"], textarea {
      width: 100%;
      padding: 9px 12px;
      border: 1px solid #475569;
      border-radius: 6px;
      background: var(--sb-input);
      color: #fff;
      font: inherit;
      font-size: .88rem;
    }
    select:focus, input:focus, textarea:focus {
      border-color: var(--red);
      outline: none;
      box-shadow: 0 0 0 2px rgba(230,49,62,.2);
    }
    textarea { min-height: 70px; resize: vertical; }

    /* Color presets */
    .bg-presets {
      display: flex;
      gap: 5px;
      flex-wrap: wrap;
      align-items: center;
    }
    .preset {
      width: 28px; height: 28px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.15);
      cursor: pointer;
      transition: .2s;
      padding: 0;
      flex-shrink: 0;
    }
    .preset:hover { transform: scale(1.15); border-color: rgba(255,255,255,0.5); }
    .preset.active { border-color: var(--red); box-shadow: 0 0 0 2px var(--red); }
    #customBg {
      width: 28px; height: 28px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.15);
      background: var(--sb-input);
      padding: 2px;
      cursor: pointer;
    }

    /* Title size slider */
    input[type="range"] {
      width: 100%;
      accent-color: var(--red);
      cursor: pointer;
    }
    .size-val {
      font-size: .72rem;
      color: #94a3b8;
      display: block;
      margin-top: 3px;
    }

    .btn {
      width: 100%;
      border: 0;
      border-radius: 8px;
      padding: 14px;
      font: inherit;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 1px;
      cursor: pointer;
      transition: .2s;
      flex-shrink: 0;
    }
    .btn-primary {
      background: var(--red);
      color: #fff;
    }
    .btn-primary:hover { background: var(--red-dark); transform: translateY(-1px); box-shadow: 0 8px 20px rgba(230,49,62,.3); }
    .btn-secondary {
      background: rgba(255,255,255,.06);
      color: #94a3b8;
      margin-top: 6px;
    }
    .btn-secondary:hover { background: rgba(255,255,255,.1); color: #fff; }

    .note {
      margin-top: 8px;
      padding: 10px;
      border: 1px solid var(--sb-border);
      border-radius: 6px;
      background: rgba(255,255,255,.02);
      color: #64748b;
      font-size: .78rem;
      line-height: 1.4;
    }

    /* ============================================================
       3. WORKSPACE & ARTBOARD
       ============================================================ */
    .workspace {
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: auto;
      padding: 30px;
      background: #020617;
      border-radius: 12px;
    }
    .wrap {
      position: relative;
      display: flex;
      align-items: flex-start;
      justify-content: flex-start;
      flex-shrink: 0;
      transition: width 0.15s ease, height 0.15s ease;
    }
    .artboard {
      --title-size: 92px;
      position: relative;
      width: 1080px;
      height: 1080px;
      overflow: hidden;
      background: #fff;
      color: var(--ink);
      box-shadow: 0 30px 60px rgba(0,0,0,.3);
      transform-origin: top left;
      flex-shrink: 0;
    }
    /* Formats */
    .size-square { width: 1080px; height: 1080px; }
    .size-portrait { width: 1080px; height: 1350px; }
    .size-story { width: 1080px; height: 1920px; }
    .size-a4 { width: 1240px; height: 1754px; }
    .size-rollup { width: 900px; height: 2100px; }
    .size-tshirt { width: 1400px; height: 1700px; }
    .size-label { width: 1300px; height: 760px; }

    /* Layers */
    .bg, .photo, .tint { position: absolute; inset: 0; }
    .bg { z-index: 1; background: #fff; }
    .photo { z-index: 2; background-size: cover; background-position: center; opacity: 0; }
    .tint { z-index: 3; pointer-events: none; }
    .grain {
      position: absolute; inset: 0; z-index: 5;
      pointer-events: none; opacity: .08;
      background-image: radial-gradient(circle at 1px 1px, rgba(0,0,0,.15) 1px, transparent 0);
      background-size: 20px 20px;
    }

    /* RDC tricolor stripe */
    .rdc {
      position: absolute; right: 0; top: 0; z-index: 25;
      width: 15px; height: 100%;
      display: flex; flex-direction: column;
    }
    .rdc div { flex: 1; }
    .rdc .s1 { background: #14aee9; }
    .rdc .s2 { background: #ffe11f; }
    .rdc .s3 { background: #e6313e; }

    /* Project logo top-left */
    .project-logo-wrap {
      position: absolute;
      top: 36px; left: 50px;
      z-index: 30;
    }
    .project-logo {
      height: 72px;
      object-fit: contain;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,.08));
    }

    /* Partners strip — minimal, elegant, at bottom */
    .partners-strip {
      position: absolute;
      bottom: 0; left: 0; right: 15px;
      z-index: 30;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 18px;
      background: rgba(255,255,255,.94);
      border-top: 1px solid rgba(0,0,0,.06);
    }
    .partners-strip .ps-label {
      font-size: 7px;
      font-weight: 800;
      color: rgba(0,0,0,.28);
      text-transform: uppercase;
      letter-spacing: .5px;
    }
    .partners-strip .ps-sep {
      width: 1px; height: 20px;
      background: rgba(0,0,0,.08);
    }
    .partners-strip img {
      height: 26px;
      object-fit: contain;
      opacity: .7;
    }

    /* Content area */
    .content {
      position: absolute;
      inset: 0;
      z-index: 10;
      padding: 130px 60px 72px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    /* Footer contact */
    .footer-bar {
      position: absolute;
      left: 60px; right: 75px; bottom: 60px;
      z-index: 30;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      padding-top: 16px;
      border-top: 2px solid rgba(0,0,0,.08);
      color: currentColor;
    }
    .footer-contact { font-size: 18px; font-weight: 900; opacity: .7; }
    .footer-tag { font-size: 13px; font-weight: 900; text-transform: uppercase; opacity: .4; letter-spacing: 1px; }

    /* ============================================================
       4. TYPOGRAPHY & SHARED CLASSES
       ============================================================ */
    .accent { color: var(--red); font-weight: 900; }
    .kicker {
      display: inline-flex; align-self: flex-start;
      margin-bottom: 20px; padding: 9px 14px;
      background: var(--yellow); color: var(--blue-dark);
      font-size: 18px; font-weight: 900; text-transform: uppercase; line-height: 1;
    }
    .title {
      margin: 0; max-width: 920px;
      font-family: var(--display);
      font-size: var(--title-size);
      font-weight: 900; line-height: .92;
      text-transform: uppercase;
    }
    .subtitle {
      max-width: 800px; margin: 24px 0 0;
      font-size: 30px; font-weight: 800; line-height: 1.25; opacity: .82;
    }
    .body-text {
      max-width: 820px; margin: 24px 0 0;
      font-size: 23px; font-weight: 600; line-height: 1.45; opacity: .72;
    }
    .callout {
      width: fit-content; max-width: 840px; margin-top: 28px;
      padding: 16px 24px; background: var(--red); color: #fff;
      font-size: 28px; font-weight: 900; text-transform: uppercase; line-height: 1.1;
    }
    .callout.blue { background: var(--blue); }
    .callout.yellow { background: var(--yellow); color: var(--blue-dark); }

    /* ============================================================
       5. THEMES
       ============================================================ */
    .theme-blue { color: #fff; }
    .theme-blue .bg { background: linear-gradient(160deg, #174f9f, #123a7d); }
    .theme-blue .photo { opacity: .2; filter: grayscale(1); }
    .theme-blue .tint { background: linear-gradient(135deg, rgba(4,22,55,.6), rgba(23,79,159,.6)); }
    .theme-blue .partners-strip { background: rgba(4,22,55,.85); }
    .theme-blue .partners-strip .ps-label { color: rgba(255,255,255,.35); }
    .theme-blue .partners-strip .ps-sep { background: rgba(255,255,255,.15); }
    .theme-blue .partners-strip img { opacity: .85; filter: brightness(10); }
    .theme-blue .footer-bar { border-top-color: rgba(255,255,255,.2); }

    .theme-green { color: #fff; }
    .theme-green .bg { background: linear-gradient(160deg, #1B7D3A, #145A2B); }
    .theme-green .photo { opacity: .2; filter: saturate(.8); }
    .theme-green .tint { background: linear-gradient(90deg, rgba(4,70,25,.3), rgba(4,70,25,.6)); }
    .theme-green .partners-strip { background: rgba(4,70,25,.85); }
    .theme-green .partners-strip img { opacity: .85; filter: brightness(10); }
    .theme-green .footer-bar { border-top-color: rgba(255,255,255,.2); }

    .theme-soft .bg { background: linear-gradient(135deg, rgba(17,169,217,.1), rgba(255,221,36,.08)), #f8fbff; }
    .theme-clean .bg { background: linear-gradient(180deg, #f6f8fb, #fff); }

    .theme-photo { color: #fff; }
    .theme-photo .photo { opacity: 1; filter: saturate(.9) contrast(1.02); }
    .theme-photo .tint { background: linear-gradient(180deg, rgba(9,28,61,.5), rgba(9,28,61,.75)); }
    .theme-photo .partners-strip { background: rgba(9,28,61,.85); }
    .theme-photo .partners-strip img { filter: brightness(10); }
    .theme-photo .footer-bar { border-top-color: rgba(255,255,255,.2); }

    /* ============================================================
       6. LAYOUT OVERRIDES
       ============================================================ */
    .layout-centered .content { align-items: center; text-align: center; }
    .layout-centered .kicker { align-self: center; }
    .layout-centered .title, .layout-centered .subtitle, .layout-centered .body-text { margin-left: auto; margin-right: auto; }

    /* RUMOR / FACT-CHECK LAYOUT */
    .layout-rumor .content {
      justify-content: flex-start;
      padding-top: 130px;
      text-align: left;
    }
    .layout-rumor .project-logo-wrap, .layout-rumor .footer-bar, .layout-rumor .rdc {
      display: none;
    }
    .rumeur-badge {
      display: inline-flex;
      align-items: center;
      background: rgba(230,49,62,0.1);
      border: 3px solid var(--red);
      border-radius: 50px;
      padding: 10px 24px;
      margin-bottom: 24px;
      align-self: flex-start;
    }
    .rumeur-badge span {
      font-family: var(--display);
      font-weight: 900;
      font-size: 16px;
      color: var(--red);
      text-transform: uppercase;
      letter-spacing: 2px;
    }
    .rumeur-box {
      background: #F8FAFC;
      border-left: 10px solid var(--red);
      border: 1px solid #E2E8F0;
      border-left: 10px solid var(--red);
      border-radius: 0 16px 16px 0;
      padding: 30px 36px;
      margin: 20px 0;
      position: relative;
      width: 100%;
    }
    .rumeur-box::before {
      content: '❌';
      position: absolute;
      top: -18px;
      left: -18px;
      font-size: 32px;
      background: white;
      border: 1px solid #E2E8F0;
      border-radius: 50%;
      width: 48px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 6px 15px rgba(0,0,0,0.06);
    }
    .rumeur-text {
      font-family: var(--font);
      font-size: 26px;
      font-weight: 700;
      color: var(--ink);
      font-style: italic;
      line-height: 1.45;
    }
    .stamp {
      position: absolute;
      top: 48%;
      right: 70px;
      transform: translateY(-50%) rotate(-12deg) scale(1);
      font-family: var(--display);
      font-weight: 900;
      font-size: 110px;
      text-transform: uppercase;
      border: 10px solid;
      border-radius: 24px;
      padding: 8px 45px;
      opacity: 0.9;
      z-index: 35;
      background: white;
      box-shadow: 0 15px 35px rgba(0,0,0,0.08);
      pointer-events: none;
    }
    .stamp.faux {
      color: #EF5350;
      border-color: #EF5350;
    }
    .stamp.vrai {
      color: #2E7D32;
      border-color: #2E7D32;
    }
    .stamp.trompeur {
      color: #F57C00;
      border-color: #F57C00;
    }
    .explication-box {
      background: #F0FDF4;
      border: 1px solid #DCFCE7;
      border-left: 10px solid #2E7D32;
      border-radius: 0 16px 16px 0;
      padding: 26px 36px;
      margin-top: auto;
      margin-bottom: 20px;
      width: 100%;
    }
    .explication-box .check-title {
      font-family: var(--display);
      font-weight: 900;
      font-size: 18px;
      color: #2E7D32;
      text-transform: uppercase;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .explication-text {
      font-family: var(--font);
      font-size: 22px;
      font-weight: 600;
      color: #1B5E20;
      line-height: 1.5;
    }
    .rumeur-source {
      font-family: var(--font);
      font-size: 16px;
      color: var(--muted);
      margin-top: 10px;
    }

    /* LUCHA GREEN — full custom layout */
    .layout-lucha .project-logo-wrap,
    .layout-lucha .partners-strip,
    .layout-lucha .footer-bar,
    .layout-lucha .rdc { display: none; }
    .layout-lucha .content { top: 0; bottom: 0; left: 0; right: 0; padding: 0; justify-content: flex-start; }
    .layout-lucha .bg { background: linear-gradient(160deg, #1B5E20, #2E7D32); }
    .layout-lucha .photo { opacity: 0; }
    .layout-lucha .tint { display: none; }

    .lucha-top-logos {
      display: flex; align-items: center; justify-content: space-between;
      padding: 28px 40px 0;
    }
    .lucha-top-logos img { height: 56px; object-fit: contain; filter: brightness(10); }
    .lucha-top-logos .lucha-sponsors { display: flex; gap: 14px; align-items: center; }
    .lucha-top-logos .lucha-sponsors img { height: 32px; opacity: .8; }

    .lucha-card {
      position: absolute; top: 110px; right: 35px;
      width: 460px;
      background: #FFD600;
      border-radius: 40px 8px 40px 8px;
      padding: 32px 36px;
      z-index: 15;
    }
    .lucha-card .lucha-tag {
      display: inline-block;
      font-size: 14px; font-weight: 800; text-transform: uppercase;
      color: #1B5E20; letter-spacing: 2px; margin-bottom: 8px;
    }
    .lucha-card .lucha-hashtag {
      font-family: var(--display);
      font-size: 64px; font-weight: 900;
      color: #1B5E20; line-height: .95;
      text-transform: uppercase;
    }

    .lucha-portrait {
      position: absolute; left: 0; top: 100px;
      width: 42%; bottom: 120px;
      background-size: cover; background-position: center top;
      z-index: 12;
    }

    .lucha-msg {
      position: absolute; right: 30px; top: 360px;
      width: 52%; z-index: 15; color: #fff;
    }
    .lucha-msg h3 {
      font-family: var(--display);
      font-size: 34px; font-weight: 900;
      line-height: 1.15; margin-bottom: 20px;
      text-transform: uppercase;
    }
    .lucha-quote-box {
      background: rgba(0,0,0,.25);
      border-left: 5px solid #FFD600;
      padding: 20px 24px;
      border-radius: 0 12px 12px 0;
    }
    .lucha-quote-box p {
      font-size: 18px; line-height: 1.45; color: rgba(255,255,255,.9);
      font-style: italic;
    }
    .lucha-quote-box .lucha-author {
      margin-top: 10px;
      font-size: 15px; font-weight: 800; color: #FFD600;
    }

    .lucha-bottom-bar {
      position: absolute; bottom: 0; left: 0; right: 0;
      height: 110px; background: #0B1121;
      display: flex; align-items: center;
      justify-content: space-between;
      padding: 0 40px;
      z-index: 20;
    }
    .lucha-bottom-bar .lucha-cta {
      font-size: 16px; color: rgba(255,255,255,.8);
      max-width: 50%; line-height: 1.3;
    }
    .lucha-bottom-bar .lucha-phone-col {
      text-align: right;
    }
    .lucha-bottom-bar .lucha-phone-num {
      font-family: var(--display);
      font-size: 30px; font-weight: 900; color: #FFD600;
    }
    .lucha-bottom-bar .lucha-phone-sub {
      font-size: 12px; font-weight: 700; color: rgba(255,255,255,.5);
      text-transform: uppercase; letter-spacing: 1px;
    }

    /* WAVE / BLOB — organic shape layout */
    .layout-wave .footer-bar { display: none; }
    .layout-wave .content { top: 130px; bottom: 60px; padding: 0 50px; justify-content: flex-start; }
    .layout-wave .photo { opacity: 0; }
    .layout-wave .tint { display: none; }

    .wave-banner {
      text-align: center;
      padding: 14px 30px;
      background: #E65100;
      color: #fff;
      font-size: 22px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 1px;
      border-radius: 0;
    }
    .wave-title {
      text-align: center;
      font-family: var(--display);
      font-size: var(--title-size);
      font-weight: 900;
      color: var(--ink);
      text-transform: uppercase;
      line-height: .95;
      margin: 24px 0 20px;
    }
    .wave-blob {
      width: 75%; min-height: 320px;
      margin: 0 auto;
      background: #0288D1;
      border-radius: 48% 52% 38% 62% / 42% 48% 52% 58%;
      padding: 50px 44px;
      display: flex;
      align-items: center; justify-content: center;
      text-align: center;
      animation: blobMorph 8s infinite ease-in-out;
    }
    @keyframes blobMorph {
      0%, 100% { border-radius: 48% 52% 38% 62% / 42% 48% 52% 58%; }
      25% { border-radius: 55% 45% 48% 52% / 38% 55% 45% 62%; }
      50% { border-radius: 42% 58% 52% 48% / 55% 42% 58% 45%; }
      75% { border-radius: 52% 48% 42% 58% / 48% 52% 42% 58%; }
    }
    .wave-blob p {
      font-size: 32px; font-weight: 800;
      color: #fff; line-height: 1.3;
      max-width: 580px;
    }

    .six-grid {

    const STORAGE_KEY = "tuchunguze_studio_v3";
    const state = {
      templateId: TEMPLATES[0].id,
      formatId: "square",
      bgColor: "auto",
      titleSize: 92,
      values: {},
      photos: {}
    };

    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) Object.assign(state, JSON.parse(raw));
      } catch (e) { console.warn(e); }
    }
    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function tpl() { return TEMPLATES.find(t => t.id === state.templateId) || TEMPLATES[0]; }
    function vals() { const t = tpl(); return { ...t.defaults, ...(state.values[t.id] || {}) }; }

    // ======================================================
    // TEXT UTILITIES
    // ======================================================
    function esc(s) {
      return String(s || "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
    }
    function br(s) { return esc(s).replace(/\\n/g, "<br>").replace(/\n/g, "<br>"); }

    // Parse [word] → <span class="accent">word</span>
    function richText(text, accentWord) {
      let result = String(text || "");
      // First handle [bracket] syntax
      result = result.replace(/\[([^\]]+)\]/g, '<span class="accent">$1</span>');
      // Then handle accentWord if provided and no brackets were found
      if (accentWord && !text.includes("[")) {
        const word = String(accentWord).trim();
        if (word) {
          result = result.split("\n").map(line => {
            const lower = line.toLowerCase(), w = word.toLowerCase(), i = lower.indexOf(w);
            if (i < 0) return esc(line);
            return esc(line.slice(0, i)) + '<span class="accent">' + esc(line.slice(i, i + word.length)) + '</span>' + esc(line.slice(i + word.length));
          }).join("<br>");
          return result;
        }
      }
      // Escape only the non-span parts
      const parts = result.split(/(<span class="accent">.*?<\/span>)/g);
      return parts.map(p => p.startsWith('<span') ? p : esc(p).replace(/\\n/g, "<br>").replace(/\n/g, "<br>")).join("");
    }

    // ======================================================
    // FIELD DEFINITIONS
    // ======================================================
    function fieldsFor(t) {
      if (t.family === "rumor") return [["badge","Badge haut","text"],["verdict","Verdict (FAUX, VRAI, TROMPEUR)","text"],["rumeur","Rumeur à vérifier","textarea"],["explication","Explication / Vérité","textarea"],["source","Source","text"],["contact","Bas de page","text"]];
      if (t.family === "lucha") return [["hashtag","Hashtag","text"],["title","Titre principal","textarea"],["quote","Citation / Déclaration","textarea"],["author","Nom de l'auteur","text"],["cta","Appel à l'action","text"],["phone","Téléphone WhatsApp","text"]];
      if (t.family === "wave") return [["banner","Bandeau coloré","text"],["title","Titre principal","textarea"],["body","Message central","textarea"],["emoji","Emoji bas","text"]];
      if (t.family === "grid6") return [["title","Titre bannière","text"],["item1","Point 1 (emoji|titre|desc)","text"],["item2","Point 2","text"],["item3","Point 3","text"],["item4","Point 4","text"],["item5","Point 5","text"],["item6","Point 6","text"],["cta","CTA bas","text"],["phone","Téléphone","text"]];
      if (t.family === "stats") return [["kicker","Sur-titre","text"],["title","Titre","textarea"],["stat1","Chiffre 1","text"],["label1","Libellé 1","text"],["stat2","Chiffre 2","text"],["label2","Libellé 2","text"],["stat3","Chiffre 3","text"],["label3","Libellé 3","text"],["contact","Bas de page","text"]];
      if (t.family === "event") return [["kicker","Sur-titre","text"],["title","Titre","textarea"],["subtitle","Description","textarea"],["date","Date / heure","text"],["place","Lieu","text"],["contact","Bas de page","text"]];
      if (t.family === "quote") return [["kicker","Sur-titre","text"],["title","Citation principale","textarea"],["subtitle","Message","textarea"],["author","Signature","text"],["contact","Bas de page","text"]];
      if (t.family === "tshirt") return [["title","Slogan","textarea"],["subtitle","Hashtag","text"]];
      return [["kicker","Sur-titre","text"],["title","Titre","textarea"],["subtitle","Sous-titre","textarea"],["body","Texte court","textarea"],["callout","Bandeau","text"],["contact","Bas de page","text"]];
    }

    // ======================================================
    // CONTROLS RENDERING
    // ======================================================
    function renderControls() {
      const t = tpl(), v = vals();

      // Template select
      templateSelect.innerHTML = TEMPLATES.map(x =>
        `<option value="${x.id}" ${x.id === t.id ? "selected" : ""}>${x.name}</option>`
      ).join("");

      // Format select
      if (!t.formats.includes(state.formatId)) state.formatId = t.formats[0];
      formatSelect.innerHTML = t.formats.map(id =>
        `<option value="${id}" ${id === state.formatId ? "selected" : ""}>${FORMATS[id].label}</option>`
      ).join("");

      // Title size
      titleRange.value = state.titleSize;
      titleVal.textContent = state.titleSize + " px";

      // Bg presets
      document.querySelectorAll(".preset").forEach(btn => {
        btn.classList.toggle("active", btn.dataset.bg === state.bgColor);
      });

      // Fields
      const flds = fieldsFor(t);
      fields.innerHTML = flds.map(([key, label, type]) => {
        const val = v[key] || "";
        const ctrl = type === "textarea"
          ? `<textarea data-field="${key}">${esc(val)}</textarea>`
          : `<input type="text" data-field="${key}" value="${esc(val)}">`;
        return `<div class="form-group"><label>${label}</label>${ctrl}</div>`;
      }).join("");

      // Attach input listeners
      document.querySelectorAll("[data-field]").forEach(el => {
        el.addEventListener("input", () => {
          state.values[t.id] = { ...vals(), [el.dataset.field]: el.value };
          saveState();
          renderPoster();
        });
      });
    }

    // ======================================================
    // POSTER RENDERING
    // ======================================================
    function renderPoster() {
      const t = tpl(), v = vals(), f = FORMATS[state.formatId];
      const photoUrl = state.photos[t.id] || "";

      // Set artboard classes
      artboard.className = `artboard ${f.className} ${t.theme}`;
      artboard.style.setProperty("--title-size", state.titleSize + "px");

      // Background color
      if (state.bgColor === "auto") {
        bg.style.background = "";
      } else {
        bg.style.background = state.bgColor;
      }

      // Photo
      const activePhoto = photoUrl || t.defaults.defaultPhoto || "";
      photo.style.backgroundImage = activePhoto ? `url('${activePhoto}')` : "";
      sidePhoto.style.backgroundImage = activePhoto ? `url('${activePhoto}')` : "";
      if (activePhoto) {
        if (t.theme.includes("theme-photo")) {
          photo.style.opacity = "1";
        } else if (t.theme.includes("theme-blue")) {
          photo.style.opacity = ".2";
        } else if (t.theme.includes("theme-green")) {
          photo.style.opacity = ".2";
        } else {
          photo.style.opacity = ".1";
        }
      } else {
        photo.style.opacity = "0";
      }

      // Footer
      footerContact.textContent = v.contact || "TUCHUNGUZE II";

      // Visibility of shared elements
      const isLucha = t.theme.includes("layout-lucha");
      const isGrid6 = t.theme.includes("layout-grid6");
      const isWave = t.theme.includes("layout-wave");
      const isRumor = t.theme.includes("layout-rumor");
      partnersStrip.style.display = (isLucha || isGrid6 || isRumor) ? "none" : "";
      footerBar.style.display = (isLucha || isGrid6 || isWave || isRumor) ? "none" : "";

      // Render content by family
      let html = "";
      switch (t.family) {
        case "rumor": html = renderRumor(v); break;
        case "lucha": html = renderLucha(v, photoUrl); break;
        case "wave": html = renderWave(v); break;
        case "grid6": html = renderGrid6(v); break;
        case "stats": html = renderStats(v); break;
        case "event": html = renderEvent(v); break;
        case "quote": html = renderQuote(v); break;
        case "tshirt": html = renderTshirt(v); break;
        default: html = renderClassic(v); break;
      }
      renderTarget.innerHTML = html;
      fitPreview();
    }

    // ── RUMOR ──
    function renderRumor(v) {
      const stampType = String(v.verdict || "FAUX").toUpperCase();
      const stampClass = stampType === "VRAI" ? "vrai" : (stampType === "FAUX" ? "faux" : "trompeur");
      return `
        <div class="tpl-m1">
          <div class="rumeur-badge">
            <span>${esc(v.badge || "🔍 VÉRIFICATION DES FAITS")}</span>
          </div>
          <div class="rumeur-box">
            <div class="rumeur-text">${br(v.rumeur)}</div>
          </div>
          <div class="stamp ${stampClass}">${stampType}</div>
          <div class="explication-box">
            <div class="check-title">✅ CE QUE DISENT LES EXPERTS</div>
            <div class="explication-text">${br(v.explication)}</div>
          </div>
          ${v.source ? `<div class="rumeur-source">Source : ${esc(v.source)}</div>` : ""}
        </div>
      `;
    }

    // ── CLASSIC ──
    function renderClassic(v) {
      const calloutCls = tpl().theme.includes("theme-clean") ? "blue" : "";
      return `
        ${v.kicker ? `<div class="kicker">${esc(v.kicker)}</div>` : ""}
        <h2 class="title">${richText(v.title)}</h2>
        ${v.subtitle ? `<p class="subtitle">${richText(v.subtitle)}</p>` : ""}
        ${v.body ? `<p class="body-text">${richText(v.body)}</p>` : ""}
        ${v.callout ? `<div class="callout ${calloutCls}">${esc(v.callout)}</div>` : ""}
      `;
    }

    // ── LUCHA GREEN ──
    function renderLucha(v, photoUrl) {
      const portrait = photoUrl || "../logos/health_worker.png";
      return `
        <div class="lucha-top-logos">
          <img src="../logos/tuchunguze.PNG" alt="Logo" style="filter:none;">
          <div class="lucha-sponsors">
            <img src="../logos/transparent/kongo-mwinda-transparent.png" alt="">
            <img src="../logos/transparent/congo-debout-transparent.png" alt="">
            <img src="../logos/transparent/acndc-transparent.png" alt="">
          </div>
        </div>
        <div class="lucha-card">
          <span class="lucha-tag">Campagne</span>
          <div class="lucha-hashtag">${esc(v.hashtag)}</div>
        </div>
        <div class="lucha-portrait" style="background-image:url('${portrait}')"></div>
        <div class="lucha-msg">
          <h3>${richText(v.title)}</h3>
          <div class="lucha-quote-box">
            <p>" ${richText(v.quote)} "</p>
            <div class="lucha-author">— ${esc(v.author)}</div>
          </div>
        </div>
        <div class="lucha-bottom-bar">
          <div class="lucha-cta">${esc(v.cta)}</div>
          <div class="lucha-phone-col">
            <div class="lucha-phone-num">${esc(v.phone)}</div>
            <div class="lucha-phone-sub">Via WhatsApp</div>
          </div>
        </div>
      `;
    }

    // ── WAVE / BLOB ──
    function renderWave(v) {
      return `
        <div class="wave-banner">${esc(v.banner)}</div>
        <div class="wave-title">${richText(v.title)}</div>
        <div class="wave-blob">
          <p>${richText(v.body)}</p>
        </div>
        ${v.emoji ? `<div class="wave-circle-icon">${v.emoji}</div>` : ""}
      `;
    }

    // ── GRID6 ATTENTION ──
    function renderGrid6(v) {
      const items = [v.item1, v.item2, v.item3, v.item4, v.item5, v.item6];
      const circles = items.map(raw => {
        const parts = (raw || "").split("|");
        const emoji = parts[0] || "❓";
        const label = parts[1] || "";
        return `
          <div class="grid6-item">
            <div class="grid6-circle">
              ${emoji}
              <span class="grid6-badge">✗</span>
            </div>
            <div class="grid6-item-text">${esc(label)}</div>
          </div>
        `;
      }).join("");

      return `
        <div class="grid6-banner">${esc(v.title)}</div>
        <div class="grid6-grid">${circles}</div>
        ${(v.cta || v.phone) ? `
          <div class="grid6-bottom-cta">
            <div class="g6-text">${esc(v.cta)}</div>
            <div class="g6-phone">${esc(v.phone)}</div>
          </div>
        ` : ""}
      `;
    }

    // ── STATS ──
    function renderStats(v) {
      return `
        ${v.kicker ? `<div class="kicker">${esc(v.kicker)}</div>` : ""}
        <h2 class="title">${richText(v.title)}</h2>
        <div class="stat-grid">
          <div class="stat"><strong>${esc(v.stat1)}</strong><span>${esc(v.label1)}</span></div>
          <div class="stat"><strong>${esc(v.stat2)}</strong><span>${esc(v.label2)}</span></div>
          <div class="stat"><strong>${esc(v.stat3)}</strong><span>${esc(v.label3)}</span></div>
        </div>
      `;
    }

    // ── EVENT ──
    function renderEvent(v) {
      return `
        ${v.kicker ? `<div class="kicker">${esc(v.kicker)}</div>` : ""}
        <h2 class="title">${richText(v.title)}</h2>
        ${v.subtitle ? `<p class="subtitle">${richText(v.subtitle)}</p>` : ""}
        <div class="event-line">
          <div class="event-pill yellow">${esc(v.date)}</div>
          <div class="event-pill">${esc(v.place)}</div>
        </div>
      `;
    }

    // ── QUOTE ──
    function renderQuote(v) {
      return `
        ${v.kicker ? `<div class="kicker">${esc(v.kicker)}</div>` : ""}
        <p class="quote-text">${richText(v.title)}</p>
        ${v.subtitle ? `<p class="subtitle">${richText(v.subtitle)}</p>` : ""}
        ${v.author ? `<div class="author-line">${esc(v.author)}</div>` : ""}
      `;
    }

    // ── T-SHIRT ──
    function renderTshirt(v) {
      return `
        <img class="tshirt-logo" src="../logos/tuchunguze.PNG" alt="TUCHUNGUZE II">
        <h2 class="title">${richText(v.title)}</h2>
        ${v.subtitle ? `<p class="subtitle">${esc(v.subtitle)}</p>` : ""}
      `;
    }

    // ======================================================
    // FIT PREVIEW
    // ======================================================
    function fitPreview() {
      const maxW = workspace.clientWidth - 60;
      const maxH = workspace.clientHeight - 60;
      
      const artW = artboard.offsetWidth || 1080;
      const artH = artboard.offsetHeight || 1080;
      
      const scale = Math.min(maxW / artW, maxH / artH, 0.72);
      const s = Math.max(0.18, scale);
      
      artboard.style.transform = `scale(${s})`;
      wrap.style.width = `${artW * s}px`;
      wrap.style.height = `${artH * s}px`;
    }

    // ======================================================
    // EXPORT
    // ======================================================
    async function exportPng() {
      exportBtn.textContent = "⏳ Export...";
      exportBtn.disabled = true;
      try {
        const origTransform = artboard.style.transform;
        const origWrapW = wrap.style.width;
        const origWrapH = wrap.style.height;

        artboard.style.transform = "scale(1)";
        wrap.style.width = `${artboard.offsetWidth}px`;
        wrap.style.height = `${artboard.offsetHeight}px`;

        wrap.style.position = "fixed";
        wrap.style.top = "0";
        wrap.style.left = "0";
        wrap.style.zIndex = "-9999";

        await document.fonts.ready;
        await new Promise(r => setTimeout(r, 400));

        const canvas = await html2canvas(artboard, {
          scale: 2,
          backgroundColor: "#fff",
          useCORS: true,
          allowTaint: true,
          width: artboard.offsetWidth,
          height: artboard.offsetHeight
        });

        artboard.style.transform = origTransform;
        wrap.style.width = origWrapW;
        wrap.style.height = origWrapH;

        wrap.style.position = "";
        wrap.style.top = "";
        wrap.style.left = "";
        wrap.style.zIndex = "";

        const a = document.createElement("a");
        a.download = `TUCHUNGUZE_${state.templateId}_${state.formatId}_${Date.now()}.png`;
        a.href = canvas.toDataURL("image/png", 1);
        a.click();
      } catch (err) {
        console.error("Export error:", err);
        fitPreview();
        wrap.style.position = "";
        wrap.style.top = "";
        wrap.style.left = "";
        wrap.style.zIndex = "";
        alert("Erreur d'export. Vérifiez la console.");
      } finally {
        exportBtn.textContent = "⬇ Exporter PNG HD";
        exportBtn.disabled = false;
        fitPreview();
      }
    }

    // ======================================================
    // EVENT LISTENERS
    // ======================================================
    templateSelect.addEventListener("change", e => {
      state.templateId = e.target.value;
      state.formatId = tpl().formats[0];
      renderAll();
    });
    formatSelect.addEventListener("change", e => {
      state.formatId = e.target.value;
      renderAll();
    });
    titleRange.addEventListener("input", e => {
      state.titleSize = parseInt(e.target.value);
      titleVal.textContent = state.titleSize + " px";
      saveState();
      renderPoster();
    });

    // Background presets
    document.querySelectorAll(".preset").forEach(btn => {
      btn.addEventListener("click", () => {
        state.bgColor = btn.dataset.bg;
        document.querySelectorAll(".preset").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        saveState();
        renderPoster();
      });
    });
    customBg.addEventListener("input", () => {
      state.bgColor = customBg.value;
      document.querySelectorAll(".preset").forEach(b => b.classList.remove("active"));
      saveState();
      renderPoster();
    });

    photoInput.addEventListener("change", e => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        state.photos[state.templateId] = reader.result;
        saveState();
        renderPoster();
      };
      reader.readAsDataURL(file);
    });

    resetBtn.addEventListener("click", () => {
      delete state.values[state.templateId];
      delete state.photos[state.templateId];
      state.bgColor = "auto";
      state.titleSize = 92;
      renderAll();
    });
    printBtn.addEventListener("click", () => window.print());
    exportBtn.addEventListener("click", exportPng);
    window.addEventListener("resize", fitPreview);

    // ======================================================
    // RENDER ALL + INIT
    // ======================================================
    function renderAll() {
      renderControls();
      renderPoster();
      saveState();
    }

    loadState();
    renderAll();
  </script>
</body>
</html>
