    <!--
      Titre/description/canonical/Open Graph sont pilotés par page via l'API
      `head()` de TanStack Router (source unique `PUBLIC_ROUTES`, rendue par
      `<HeadContent />` dans `__root.tsx`). Ce titre n'est qu'un repli affiché
      avant le chargement du bundle ; il est remplacé par le titre de la route.
      Les balises SEO par page ne sont PAS dupliquées ici pour éviter des
      métadonnées en double.
    -->
    <title>Opays Tech — Ingénierie de l'efficience par l'IA</title>
    <meta name="twitter:card" content="summary_large_image" />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <link rel="icon" type="image/png" sizes="96x96" href="/favicon.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
