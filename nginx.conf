server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Compression Gzip/Brotli-friendly
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Cache agressif pour les assets hashés
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|otf|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff";
    }

    # Sécurité de base
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # SPA React : tout renvoie vers index.html sauf les fichiers existants
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Pages d'erreur personnalisées (la SPA gère le 404)
    error_page 404 /index.html;
}
