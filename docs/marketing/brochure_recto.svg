<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1123 794" width="1123" height="794" style="background:#f8fafc; font-family:'Outfit', 'Inter', sans-serif;">
  <!-- Gradients, Filters & Branding Symbols -->
  <defs>
    <linearGradient id="primary-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#228be6" />
      <stop offset="50%" stop-color="#3b5bdb" />
      <stop offset="100%" stop-color="#7048e8" />
    </linearGradient>
    <linearGradient id="accent-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1098ad" />
      <stop offset="100%" stop-color="#0ca678" />
    </linearGradient>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc" />
      <stop offset="50%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#f1f5f9" />
    </linearGradient>
    <linearGradient id="card-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#f8fafc" />
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="25" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.04" />
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#0f172a" flood-opacity="0.02" />
    </filter>
  </defs>

  <!-- Fond Général -->
  <rect width="1123" height="794" fill="url(#bg-grad)" />

  <!-- Décorations de fond vectorielles (Premium Glowing Blobs) -->
  <circle cx="1123" cy="100" r="280" fill="#7048e8" opacity="0.04" filter="url(#glow)" />
  <circle cx="50" cy="740" r="320" fill="#3b5bdb" opacity="0.03" filter="url(#glow)" />
  <circle cx="561" cy="400" r="180" fill="#1098ad" opacity="0.03" filter="url(#glow)" />

  <!-- Lignes de Pliage Subtiles (Guides techniques A4 tri-fold) -->
  <line x1="374.33" y1="0" x2="374.33" y2="794" stroke="#0f172a" stroke-opacity="0.05" stroke-dasharray="6,6" stroke-width="1.5" />
  <line x1="748.66" y1="0" x2="748.66" y2="794" stroke="#0f172a" stroke-opacity="0.05" stroke-dasharray="6,6" stroke-width="1.5" />

  <!-- ==================== VOLET 3 : LE CONSTAT (À GAUCHE, se replie en premier) ==================== -->
  <g transform="translate(0, 0)">
    <!-- Entête de Section avec Icône Vectorielle Haut-de-Gamme -->
    <rect x="30" y="50" width="40" height="40" rx="10" fill="url(#primary-grad)" fill-opacity="0.08" />
    <g transform="translate(38, 58)">
      <!-- Custom vector lightbulb line art -->
      <path d="M12 2C7.58 2 4 5.58 4 10C4 12.52 5.16 14.77 7 16.27V20C7 20.55 7.45 21 8 21H16C16.55 21 17 20.55 17 20V16.27C18.84 14.77 20 12.52 20 10C20 5.58 16.42 2 12 2ZM9 19V17.5H15V19H9ZM15.07 15.28L14 16.08V16.5H10V16.08L8.93 15.28C7.5 14.21 6.5 12.21 6.5 10C6.5 6.96 8.96 4.5 12 4.5C15.04 4.5 17.5 6.96 17.5 10C17.5 12.21 16.5 14.21 15.07 15.28Z" fill="url(#primary-grad)"/>
      <path d="M10 7.5H14" stroke="url(#primary-grad)" stroke-width="1.2" stroke-linecap="round" />
      <path d="M10 10H14" stroke="url(#primary-grad)" stroke-width="1.2" stroke-linecap="round" />
    </g>
    <text x="82" y="76" fill="#0f172a" font-family="'Outfit', sans-serif" font-size="19" font-weight="800" letter-spacing="0.5">Le Constat</text>
    <text x="182" y="75" fill="#64748b" font-family="'Outfit', sans-serif" font-size="14" font-weight="500">| Là où le temps s'échappe</text>
    
    <!-- Séparateur Gradient -->
    <rect x="30" y="105" width="314" height="2" fill="url(#primary-grad)" opacity="0.2" rx="1" />
    
    <!-- Paragraphe 1 (Grande Lisibilité & Aéré) -->
    <g font-family="'Inter', sans-serif" font-size="14.5" font-weight="500" fill="#334155">
      <text x="30" y="145">Votre entreprise ne manque pas</text>
      <text x="30" y="173">toujours de personnel. Elle perd</text>
      <text x="30" y="201">souvent trop de temps dans des</text>
      <text x="30" y="229">tâches répétitives, des documents</text>
      <text x="30" y="257">dispersés, des validations lentes et</text>
      <text x="30" y="285">des informations difficiles à retrouver.</text>
    </g>

    <!-- Paragraphe 2 (Encadré Premium Verre) -->
    <rect x="30" y="325" width="314" height="150" rx="16" fill="url(#card-grad)" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)" />
    
    <!-- Left Accent Border Gradient -->
    <rect x="30" y="325" width="4" height="150" rx="2" fill="url(#primary-grad)" />
    
    <!-- Beautiful Quote/Key Statement Vector Icon -->
    <g transform="translate(48, 345)" opacity="0.3">
      <path d="M11.19 2.04c-4.9.5-8.79 4.5-8.79 9.46 0 4.05 2.7 7.46 6.45 8.51.55.15.86-.44.64-.95-.69-1.63-1.09-3.42-1.09-5.31 0-5.8 4.25-10.66 9.87-11.53.53-.08.77-.69.36-1.04-1.92-1.6-4.63-2.31-7.44-1.14z" fill="url(#primary-grad)" />
    </g>

    <g font-family="'Outfit', sans-serif" font-size="15.5" font-weight="700" fill="#0f172a">
      <text x="56" y="375">Opays Tech aide les</text>
      <text x="56" y="403">organisations à rendre leur</text>
      <text x="56" y="431">travail plus fluide, plus fiable</text>
      <text x="56" y="459">et moins fatigant.</text>
    </g>

    <!-- Infographie vectorielle moderne d'Efficience (High Tech Graph) -->
    <g transform="translate(30, 520)">
      <rect width="314" height="200" rx="16" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.2" />
      <text x="16" y="28" fill="#64748b" font-family="'Outfit', sans-serif" font-size="11" font-weight="700" letter-spacing="1">MODÈLE DE FLUIDITÉ ACCÉLÉRÉE</text>
      
      <!-- Graph Axes and grid -->
      <line x1="25" y1="165" x2="295" y2="165" stroke="#e2e8f0" stroke-width="1" />
      <line x1="25" y1="50" x2="25" y2="165" stroke="#e2e8f0" stroke-width="1" />
      
      <!-- Baseline curve (Unoptimized) -->
      <path d="M 25,140 Q 90,145 160,130 T 295,120" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,4" />
      <text x="235" y="112" fill="#94a3b8" font-family="'Inter', sans-serif" font-size="9" font-weight="bold">Sans Opays</text>
      
      <!-- Optimized Curve -->
      <path d="M 25,140 Q 80,90 150,60 T 295,45" fill="none" stroke="url(#accent-grad)" stroke-width="3" stroke-linecap="round" />
      <path d="M 25,140 Q 80,90 150,60 T 295,45 L 295,165 L 25,165 Z" fill="url(#accent-grad)" opacity="0.05" />
      <text x="210" y="38" fill="#0ca678" font-family="'Outfit', sans-serif" font-size="10.5" font-weight="bold">Efficience +250%</text>

      <!-- Glow nodes -->
      <circle cx="150" cy="60" r="5" fill="#1098ad" stroke="#ffffff" stroke-width="1.5" />
      <circle cx="295" cy="45" r="6" fill="#0ca678" stroke="#ffffff" stroke-width="2" />
      
      <!-- Legend badges -->
      <rect x="25" y="176" width="8" height="8" rx="2" fill="#94a3b8" />
      <text x="38" y="184" fill="#64748b" font-family="'Inter', sans-serif" font-size="9" font-weight="600">Tâches dispersées</text>

      <rect x="155" y="176" width="8" height="8" rx="2" fill="#0ca678" />
      <text x="168" y="184" fill="#0f172a" font-family="'Inter', sans-serif" font-size="9" font-weight="bold">Processus optimisés</text>
    </g>
  </g>

  <!-- ==================== VOLET 2 : LE DOS / CONTACT (AU MILIEU) ==================== -->
  <g transform="translate(374.33, 0)">
    <!-- Entête de Section avec Icône Vectorielle -->
    <rect x="30" y="50" width="40" height="40" rx="10" fill="url(#accent-grad)" fill-opacity="0.08" />
    <g transform="translate(38, 58)">
      <!-- Custom Vector Phone/Chat Icon -->
      <path d="M19.23 15.26L16.69 14.97C16.08 14.9 15.48 15.11 15.05 15.54L13.21 17.38C10.01 15.75 7.42 13.15 5.8 9.95L7.64 8.11C8.07 7.68 8.28 7.08 8.21 6.47L7.92 3.93C7.81 3.4 7.35 3 6.77 3H3.97C3.38 3 2.97 3.51 3.02 4.09C3.4 8.5 5.37 12.51 8.51 15.65C11.65 18.79 15.66 20.76 20.07 21.14C20.65 21.19 21.16 20.78 21.16 20.19V17.39C21.16 16.81 20.76 16.35 20.23 16.26L19.23 15.26Z" fill="url(#accent-grad)"/>
    </g>
    <text x="82" y="76" fill="#0f172a" font-family="'Outfit', sans-serif" font-size="19" font-weight="800" letter-spacing="0.5">Démarrons</text>
    <text x="188" y="75" fill="#64748b" font-family="'Outfit', sans-serif" font-size="14" font-weight="500">| Diagnostic initial</text>
    
    <!-- Séparateur Gradient -->
    <rect x="30" y="105" width="314" height="2" fill="url(#accent-grad)" opacity="0.2" rx="1" />

    <!-- Paragraphe accroche -->
    <g font-family="'Outfit', sans-serif" font-size="15.5" font-weight="700" fill="#475569">
      <text x="30" y="145">Vous voulez savoir où votre</text>
      <text x="30" y="173" fill="#0f172a">organisation perd du temps ?</text>
    </g>

    <!-- Appel à l'action Card en dégradé de couleur marquant -->
    <rect x="30" y="205" width="314" height="155" rx="20" fill="url(#primary-grad)" filter="url(#shadow)" />
    
    <!-- Soft Decorative Circle inside CTA -->
    <circle cx="310" cy="205" r="70" fill="#ffffff" opacity="0.08" />
    <circle cx="280" cy="330" r="45" fill="#ffffff" opacity="0.06" />

    <!-- Elegant arrow pattern -->
    <path d="M 290,260 L 305,275 L 290,290" stroke="#ffffff" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>

    <g font-family="'Outfit', sans-serif" font-size="15.5" font-weight="800" fill="#ffffff">
      <text x="50" y="250">Contactez Opays Tech pour</text>
      <text x="50" y="278">un premier échange et un</text>
      <text x="50" y="306" fill="#a5d8ff">diagnostic de vos besoins.</text>
    </g>

    <!-- Info de Contact Carte Ultra-Premium -->
    <rect x="30" y="385" width="314" height="335" rx="20" fill="url(#card-grad)" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)" />
    
    <!-- Contact Card Header Title -->
    <text x="50" y="420" fill="#64748b" font-family="'Outfit', sans-serif" font-size="11" font-weight="800" letter-spacing="1.5">CONTACT PRESSE &amp; INFOS</text>
    <line x1="50" y1="432" x2="294" y2="432" stroke="#e2e8f0" stroke-width="1" />

    <!-- Person profile layout -->
    <g transform="translate(50, 452)">
      <!-- Avatar Sphere -->
      <circle cx="25" cy="25" r="25" fill="url(#primary-grad)" opacity="0.1" />
      <text x="25" y="31" fill="url(#primary-grad)" font-family="'Outfit', sans-serif" font-size="17" font-weight="bold" text-anchor="middle">PB</text>
      
      <!-- Name details -->
      <text x="64" y="20" fill="#0f172a" font-family="'Outfit', sans-serif" font-size="16.5" font-weight="800">Prince BAGHENI</text>
      <text x="64" y="39" fill="#64748b" font-family="'Inter', sans-serif" font-size="12" font-weight="600">Chef Commercial (CSO)</text>
    </g>

    <!-- Contact details items -->
    <g transform="translate(50, 525)">
      <!-- Email block -->
      <rect width="274" height="52" rx="10" fill="#3b5bdb" fill-opacity="0.04" />
      <!-- Email Icon -->
      <g transform="translate(14, 16)">
        <path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z" fill="#3b5bdb"/>
      </g>
      <text x="48" y="31" fill="#3b5bdb" font-family="'Outfit', sans-serif" font-size="14.5" font-weight="bold">princebagheni1@gmail.com</text>
    </g>

    <g transform="translate(50, 592)">
      <!-- Web block -->
      <rect width="274" height="52" rx="10" fill="#0ca678" fill-opacity="0.04" />
      <!-- Web Globe Icon -->
      <g transform="translate(14, 16)">
        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.53c-.26-.81-1-1.4-1.9-1.4h-1v-3c0-.55-.45-1-1-1h-6v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.4z" fill="#0ca678"/>
      </g>
      <text x="48" y="31" fill="#0ca678" font-family="'Outfit', sans-serif" font-size="15" font-weight="bold">www.opays.io</text>
    </g>

    <!-- Slogan/branding statement inside card -->
    <text x="187" y="695" fill="#64748b" font-family="'Outfit', sans-serif" font-size="11.5" font-weight="bold" font-style="italic" text-anchor="middle">L'ingénierie de l'efficience opérationnelle.</text>
  </g>

  <!-- ==================== VOLET 1 : LA COUVERTURE (À DROITE, visible en premier) ==================== -->
  <g transform="translate(748.66, 0)">
    <!-- Logo Vectoriel Technologique Tridimensionnel de Prestige -->
    <g transform="translate(187, 210)">
      <!-- Hexagones Concentriques en Rotation Virtuelle -->
      <polygon points="0,-72 62.35,-36 62.35,36 0,72 -62.35,36 -62.35,-36" fill="none" stroke="url(#primary-grad)" stroke-width="4.5" opacity="0.4" />
      <polygon points="0,-56 48.5,-28 48.5,28 0,56 -48.5,28 -48.5,-28" fill="none" stroke="url(#accent-grad)" stroke-width="3" opacity="0.3" />
      <polygon points="0,-40 34.64,-20 34.64,20 0,40 -34.64,20 -34.64,-20" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.8" />
      
      <!-- Cœur Dynamique du Logo (Énergie de flux et d'optimisation) -->
      <path d="M -24,-24 L 0,-48 L 24,-24 L 0,0 Z" fill="url(#primary-grad)" filter="url(#shadow)" />
      <path d="M -24,12 L 0,-12 L 24,12 L 0,36 Z" fill="url(#accent-grad)" />
      
      <circle cx="0" cy="-48" r="6" fill="#ffffff" stroke="url(#primary-grad)" stroke-width="2" />
      <circle cx="0" cy="36" r="6" fill="#ffffff" stroke="url(#accent-grad)" stroke-width="2" />
    </g>

    <!-- Titre de Marque Monumental -->
    <text x="187" y="340" fill="#0f172a" font-family="'Outfit', sans-serif" font-size="40" font-weight="900" letter-spacing="2" text-anchor="middle">OPAYS TECH</text>
    
    <!-- Tagline Badge Pill (Gélule) Haute Définition -->
    <g transform="translate(57, 362)">
      <rect width="260" height="34" rx="17" fill="url(#primary-grad)" fill-opacity="0.08" stroke="url(#primary-grad)" stroke-opacity="0.15" stroke-width="1.2" />
      <text x="130" y="21" fill="#3b5bdb" font-family="'Outfit', sans-serif" font-size="11.5" font-weight="800" letter-spacing="2" text-anchor="middle">INGÉNIERIE DE L'EFFICIENCE</text>
    </g>

    <!-- Paragraphes de Présentation (Mise en page spacieuse et élégante) -->
    <g font-family="'Inter', sans-serif" font-size="14.2" font-weight="500" fill="#475569" text-anchor="middle">
      <text x="187" y="445">Opays Tech aide les entreprises à clarifier,</text>
      <text x="187" y="473" fill="#0f172a" font-weight="600">simplifier et automatiser leurs opérations</text>
      <text x="187" y="501">grâce à des solutions numériques et IA</text>
      <text x="187" y="529">adaptées à leur réalité.</text>
    </g>

    <!-- Éléments géométriques de bas de page -->
    <line x1="60" y1="585" x2="314" y2="585" stroke="#e2e8f0" stroke-width="1.5" stroke-linecap="round" />
    
    <text x="187" y="620" fill="#94a3b8" font-family="'Outfit', sans-serif" font-size="10.5" font-weight="800" letter-spacing="5" text-anchor="middle">ÉDITION MAI 2026</text>
    
    <!-- Accent Line decorative bar -->
    <rect x="157" y="640" width="60" height="5" rx="2.5" fill="url(#primary-grad)" />
  </g>
</svg>
