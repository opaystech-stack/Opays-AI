<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1123 794" width="1123" height="794" style="background:#f8fafc; font-family:'Outfit', 'Inter', sans-serif;">
  <!-- Gradients & Styles -->
  <defs>
    <linearGradient id="primary-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b5bdb" />
      <stop offset="100%" stop-color="#7048e8" />
    </linearGradient>
    <linearGradient id="accent-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1098ad" />
      <stop offset="100%" stop-color="#0ca678" />
    </linearGradient>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc" />
      <stop offset="50%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#f1f5f9" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="30" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Fond -->
  <rect width="1123" height="794" fill="url(#bg-grad)" />

  <!-- Décorations de fond vectorielles (Premium Tech) -->
  <circle cx="1123" cy="0" r="300" fill="#7048e8" opacity="0.03" filter="url(#glow)" />
  <circle cx="0" cy="794" r="350" fill="#3b5bdb" opacity="0.02" filter="url(#glow)" />
  <circle cx="561" cy="400" r="200" fill="#1098ad" opacity="0.02" filter="url(#glow)" />

  <!-- Lignes de Pliage (Subtiles guides) -->
  <line x1="374.33" y1="0" x2="374.33" y2="794" stroke="#0f172a" stroke-opacity="0.06" stroke-dasharray="5,5" stroke-width="2" />
  <line x1="748.66" y1="0" x2="748.66" y2="794" stroke="#0f172a" stroke-opacity="0.06" stroke-dasharray="5,5" stroke-width="2" />

  <!-- ==================== VOLET 3 : LE CONSTAT (À GAUCHE, se replie en premier) ==================== -->
  <g transform="translate(0, 0)">
    <!-- Zone utile : marges de 30px -->
    <!-- Titre -->
    <rect x="30" y="55" width="28" height="28" rx="6" fill="#7048e8" fill-opacity="0.1" />
    <text x="44" y="74" fill="#7048e8" font-size="14" font-weight="bold" text-anchor="middle">💡</text>
    <text x="70" y="74" fill="#0f172a" font-size="18" font-weight="bold" letter-spacing="0.5">Le Constat : Là où le temps s'échappe</text>
    
    <!-- Séparateur -->
    <line x1="30" y1="95" x2="344" y2="95" stroke="#7048e8" stroke-opacity="0.15" stroke-width="2" />
    
    <!-- Paragraphe 1 -->
    <text x="30" y="135" fill="#334155" font-size="13.5" font-weight="600" letter-spacing="0.2">Votre entreprise ne manque pas</text>
    <text x="30" y="155" fill="#334155" font-size="13.5" font-weight="600" letter-spacing="0.2">toujours de personnel. Elle perd</text>
    <text x="30" y="175" fill="#334155" font-size="13.5" font-weight="600" letter-spacing="0.2">souvent trop de temps dans des</text>
    <text x="30" y="195" fill="#334155" font-size="13.5" font-weight="600" letter-spacing="0.2">tâches répétitives, des documents</text>
    <text x="30" y="215" fill="#334155" font-size="13.5" font-weight="600" letter-spacing="0.2">dispersés, des validations lentes et</text>
    <text x="30" y="235" fill="#334155" font-size="13.5" font-weight="600" letter-spacing="0.2">des informations difficiles à retrouver.</text>

    <!-- Paragraphe 2 (Encadré Premium) -->
    <rect x="30" y="275" width="314" height="120" rx="12" fill="#ffffff" fill-opacity="0.75" stroke="#e2e8f0" stroke-width="1.5" />
    <path d="M 45,305 L 45,365" stroke="url(#primary-grad)" stroke-width="3" stroke-linecap="round" />
    
    <text x="60" y="315" fill="#0f172a" font-size="13" font-weight="bold">Opays Tech aide les</text>
    <text x="60" y="335" fill="#0f172a" font-size="13" font-weight="bold">organisations à rendre leur</text>
    <text x="60" y="355" fill="#0f172a" font-size="13" font-weight="bold">travail plus fluide, plus fiable</text>
    <text x="60" y="375" fill="#0f172a" font-size="13" font-weight="bold">et moins fatigant.</text>

    <!-- Graphic Element (Efficiency curves) -->
    <path d="M 30,550 Q 110,480 190,560 T 340,490" fill="none" stroke="url(#accent-grad)" stroke-width="2.5" stroke-opacity="0.4" />
    <path d="M 30,570 Q 110,500 190,580 T 340,510" fill="none" stroke="url(#primary-grad)" stroke-width="2.5" stroke-opacity="0.25" />
    
    <circle cx="190" cy="560" r="5" fill="#0ca678" />
    <circle cx="340" cy="490" r="5" fill="#7048e8" />
  </g>

  <!-- ==================== VOLET 2 : LE DOS / APPEL À L'ACTION (AU MILIEU) ==================== -->
  <g transform="translate(374.33, 0)">
    <!-- Titre -->
    <rect x="30" y="55" width="28" height="28" rx="6" fill="#1098ad" fill-opacity="0.1" />
    <text x="44" y="74" fill="#1098ad" font-size="14" font-weight="bold" text-anchor="middle">📞</text>
    <text x="70" y="74" fill="#0f172a" font-size="18" font-weight="bold" letter-spacing="0.5">Démarrons : Le diagnostic initial</text>
    
    <!-- Séparateur -->
    <line x1="30" y1="95" x2="344" y2="95" stroke="#1098ad" stroke-opacity="0.15" stroke-width="2" />

    <!-- Paragraphe -->
    <text x="30" y="135" fill="#475569" font-size="13.5" font-weight="600">Vous voulez savoir où votre</text>
    <text x="30" y="155" fill="#475569" font-size="13.5" font-weight="600">organisation perd du temps ?</text>

    <!-- Appel à l'action marquant (Premium Filled card) -->
    <rect x="30" y="195" width="314" height="135" rx="16" fill="url(#primary-grad)" />
    
    <text x="50" y="235" fill="#ffffff" font-size="13.5" font-weight="bold" letter-spacing="0.2">Contactez Opays Tech pour</text>
    <text x="50" y="255" fill="#ffffff" font-size="13.5" font-weight="bold" letter-spacing="0.2">un premier échange et un</text>
    <text x="50" y="275" fill="#ffffff" font-size="13.5" font-weight="bold" letter-spacing="0.2">diagnostic de vos besoins.</text>

    <!-- Info de contact en bas -->
    <rect x="30" y="500" width="314" height="180" rx="12" fill="#ffffff" fill-opacity="0.75" stroke="#e2e8f0" stroke-width="1.5" />
    
    <text x="50" y="535" fill="#64748b" font-size="12" font-weight="bold" letter-spacing="1">CONTACT PRESSE &amp; INFOS</text>
    
    <text x="50" y="570" fill="#0f172a" font-size="13" font-weight="bold">Prince BAGHENI</text>
    <text x="50" y="588" fill="#475569" font-size="11.5">Chef Commercial (CSO)</text>
    
    <text x="50" y="625" fill="#3b5bdb" font-size="13" font-weight="bold">princebagheni1@gmail.com</text>
    <text x="50" y="650" fill="url(#accent-grad)" font-size="13" font-weight="bold">www.opays.io</text>
  </g>

  <!-- ==================== VOLET 1 : LA COUVERTURE (À DROITE, visible en premier) ==================== -->
  <g transform="translate(748.66, 0)">
    <!-- Logo vectoriel abstrait géométrique (Glow & Premium) -->
    <g transform="translate(187, 200)">
      <!-- Hexagone de fond -->
      <polygon points="0,-60 52,-30 52,30 0,60 -52,30 -52,-30" fill="none" stroke="url(#primary-grad)" stroke-width="3" opacity="0.4" />
      <polygon points="0,-48 41.5,-24 41.5,24 0,48 -41.5,24 -41.5,-24" fill="none" stroke="url(#accent-grad)" stroke-width="2" opacity="0.3" />
      
      <!-- Cœur du logo (Efficience en mouvement) -->
      <path d="M -20,-20 L 0,-40 L 20,-20 L 0,0 Z" fill="url(#primary-grad)" />
      <path d="M -20,10 L 0,-10 L 20,10 L 0,30 Z" fill="url(#accent-grad)" />
      
      <circle cx="0" cy="-40" r="5" fill="#ffffff" />
      <circle cx="0" cy="30" r="5" fill="#ffffff" />
    </g>

    <!-- Nom de marque -->
    <text x="187" y="340" fill="#0f172a" font-size="34" font-weight="900" letter-spacing="1.5" text-anchor="middle">OPAYS TECH</text>
    
    <!-- Tagline ardoise -->
    <rect x="73.5" y="365" width="227" height="32" rx="16" fill="url(#primary-grad)" fill-opacity="0.08" />
    <text x="187" y="386" fill="#7048e8" font-size="12" font-weight="bold" letter-spacing="2" text-anchor="middle">INGÉNIERIE DE L'EFFICIENCE</text>

    <!-- Phrase courte de présentation (Mot à mot) -->
    <text x="187" y="445" fill="#475569" font-size="12" font-weight="600" text-anchor="middle">Opays Tech aide les entreprises à clarifier,</text>
    <text x="187" y="465" fill="#475569" font-size="12" font-weight="600" text-anchor="middle">simplifier et automatiser leurs opérations</text>
    <text x="187" y="485" fill="#475569" font-size="12" font-weight="600" text-anchor="middle">grâce à des solutions numériques et IA</text>
    <text x="187" y="505" fill="#475569" font-size="12" font-weight="600" text-anchor="middle">adaptées à leur réalité.</text>

    <!-- Éléments décoratifs graphiques en bas -->
    <line x1="60" y1="560" x2="314" y2="560" stroke="#e2e8f0" stroke-width="1" />
    <text x="187" y="600" fill="#94a3b8" font-size="10" font-weight="bold" letter-spacing="4" text-anchor="middle">EDITION 2026</text>
    
    <rect x="172" y="620" width="30" height="4" rx="2" fill="url(#primary-grad)" />
  </g>
</svg>
