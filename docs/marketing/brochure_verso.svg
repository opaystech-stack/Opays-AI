<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1123 794" width="1123" height="794" style="background:#0b0e14; font-family:'Outfit', 'Inter', sans-serif;">
  <!-- Gradients & Styles -->
  <defs>
    <linearGradient id="primary-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b5bdb" />
      <stop offset="100%" stop-color="#7048e8" />
    </linearGradient>
    <linearGradient id="accent-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1098ad" />
      <stop offset="100%" stop-color="#0ca678" />
    </linearGradient>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#090b0f" />
      <stop offset="50%" stop-color="#0d1117" />
      <stop offset="100%" stop-color="#07090d" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="30" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Fond -->
  <rect width="1123" height="794" fill="url(#bg-grad)" />

  <!-- Décorations de fond vectorielles (Premium Tech) -->
  <circle cx="0" cy="0" r="300" fill="#7048e8" opacity="0.07" filter="url(#glow)" />
  <circle cx="1123" cy="794" r="350" fill="#1098ad" opacity="0.05" filter="url(#glow)" />
  <circle cx="561" cy="400" r="250" fill="#3b5bdb" opacity="0.04" filter="url(#glow)" />

  <!-- Lignes de Pliage (Subtiles guides) -->
  <line x1="374.33" y1="0" x2="374.33" y2="794" stroke="#ffffff" stroke-opacity="0.05" stroke-dasharray="5,5" stroke-width="2" />
  <line x1="748.66" y1="0" x2="748.66" y2="794" stroke="#ffffff" stroke-opacity="0.05" stroke-dasharray="5,5" stroke-width="2" />

  <!-- ==================== VOLET 4 : QUI SOMMES-NOUS & 60s (À GAUCHE) ==================== -->
  <g transform="translate(0, 0)">
    <!-- Section : Qui sommes-nous -->
    <rect x="30" y="45" width="28" height="28" rx="6" fill="#7048e8" fill-opacity="0.15" />
    <text x="44" y="64" fill="#7048e8" font-size="14" font-weight="bold" text-anchor="middle">🤝</text>
    <text x="70" y="64" fill="#ffffff" font-size="17" font-weight="bold" letter-spacing="0.5">Qui sommes-nous ?</text>
    
    <!-- Sous-titre -->
    <text x="70" y="82" fill="#94a3b8" font-size="11" font-weight="600" opacity="0.8">Cabinet d'ingénierie de l'efficience</text>
    
    <!-- Séparateur -->
    <line x1="30" y1="95" x2="344" y2="95" stroke="#7048e8" stroke-opacity="0.2" stroke-width="2" />

    <!-- Paragraphes Qui sommes-nous -->
    <g transform="translate(30, 115)" fill="#e2e8f0" font-size="11.5" font-weight="500">
      <text x="0" y="0">Opays Tech est un cabinet d'ingénierie de l'efficience.</text>
      <text x="0" y="16">Nous aidons les entreprises, institutions et organisations à</text>
      <text x="0" y="32">clarifier leurs méthodes de travail, simplifier leurs opérations</text>
      <text x="0" y="48">et automatiser ce qui peut l'être.</text>

      <text x="0" y="76" fill="#94a3b8" font-weight="normal">Notre approche est simple : nous commençons par identifier</text>
      <text x="0" y="92" fill="#94a3b8" font-weight="normal">où le temps, l'argent et l'énergie se perdent. Ensuite,</text>
      <text x="0" y="108" fill="#94a3b8" font-weight="normal">nous construisons un système adapté au besoin réel.</text>

      <!-- Citation clé mise en valeur -->
      <rect x="0" y="128" width="314" height="42" rx="6" fill="#ffffff" fill-opacity="0.02" stroke="#ffffff" stroke-opacity="0.05" />
      <path d="M 10,136 L 10,162" stroke="url(#primary-grad)" stroke-width="2" stroke-linecap="round" />
      <text x="20" y="146" fill="#ffffff" font-size="11" font-weight="bold" font-style="italic">Nous ne vendons pas de la technologie pour</text>
      <text x="20" y="160" fill="#ffffff" font-size="11" font-weight="bold" font-style="italic">impressionner. Nous vendons la suppression des coûts.</text>
    </g>

    <!-- Section : Opays Tech en 60 secondes -->
    <rect x="30" y="325" width="28" height="28" rx="6" fill="#1098ad" fill-opacity="0.15" />
    <text x="44" y="344" fill="#1098ad" font-size="14" font-weight="bold" text-anchor="middle">⚡</text>
    <text x="70" y="344" fill="#ffffff" font-size="17" font-weight="bold" letter-spacing="0.5">Opays Tech en 60 secondes</text>
    
    <!-- Séparateur -->
    <line x1="30" y1="370" x2="344" y2="370" stroke="#1098ad" stroke-opacity="0.2" stroke-width="2" />

    <!-- Paragraphes 60 secondes -->
    <g transform="translate(30, 390)" fill="#e2e8f0" font-size="11.2" font-weight="500">
      <text x="0" y="0" fill="#ffffff" font-weight="bold" font-size="11.5">Opays Tech aide les entreprises à mieux travailler.</text>

      <text x="0" y="24" fill="#94a3b8">Nous observons d'abord comment l'organisation fonctionne</text>
      <text x="0" y="38" fill="#94a3b8">réellement : les tâches qui se répètent, les documents qui se</text>
      <text x="0" y="52" fill="#94a3b8">perdent, les validations qui ralentissent tout, les informations</text>
      <text x="0" y="66" fill="#94a3b8">que personne ne retrouve au bon moment.</text>

      <text x="0" y="90">Ensuite, nous identifions les pertes de temps et d'argent,</text>
      <text x="0" y="104">puis nous construisons une solution adaptée : outil interne,</text>
      <text x="0" y="118">tableau de suivi, automatisation, assistant IA, base de</text>
      <text x="0" y="132">connaissances ou application métier.</text>

      <text x="0" y="156" fill="#0ca678" font-weight="bold">Notre promesse est simple : moins de désordre, moins de</text>
      <text x="0" y="170" fill="#0ca678" font-weight="bold">tâches inutiles, plus de visibilité et des équipes qui</text>
      <text x="0" y="184" fill="#0ca678" font-weight="bold">traillent avec plus de clarté.</text>

      <text x="0" y="208" fill="#94a3b8">Opays Tech ne vend pas la technologie pour la technologie.</text>
      <text x="0" y="222" fill="#94a3b8">Nous aidons les organisations à reprendre le contrôle sur</text>
      <text x="0" y="236" fill="#94a3b8">leur travail quotidien.</text>
    </g>
  </g>

  <!-- ==================== VOLET 5 : LES 4 PILIERS D'INTERVENTION (AU MILIEU) ==================== -->
  <g transform="translate(374.33, 0)">
    <!-- Section Titre -->
    <rect x="30" y="45" width="28" height="28" rx="6" fill="#0ca678" fill-opacity="0.15" />
    <text x="44" y="64" fill="#0ca678" font-size="14" font-weight="bold" text-anchor="middle">🛠️</text>
    <text x="70" y="64" fill="#ffffff" font-size="17" font-weight="bold" letter-spacing="0.5">Nos 4 piliers d'intervention</text>
    
    <!-- Séparateur -->
    <line x1="30" y1="95" x2="344" y2="95" stroke="#0ca678" stroke-opacity="0.2" stroke-width="2" />

    <!-- 1. Audit d'efficience -->
    <g transform="translate(30, 115)">
      <rect x="0" y="0" width="314" height="120" rx="10" fill="#ffffff" fill-opacity="0.01" stroke="#ffffff" stroke-opacity="0.04" />
      <rect x="12" y="12" width="22" height="22" rx="4" fill="#7048e8" fill-opacity="0.15" />
      <text x="23" y="28" fill="#7048e8" font-size="11" font-weight="bold" text-anchor="middle">1</text>
      <text x="44" y="28" fill="#ffffff" font-size="13" font-weight="bold">Audit d'efficience</text>
      <text x="12" y="50" fill="#94a3b8" font-size="11">Nous analysons le fonctionnement de votre organisation pour</text>
      <text x="12" y="66" fill="#94a3b8" font-size="11">repérer les tâches qui prennent trop de temps, les blocages,</text>
      <text x="12" y="82" fill="#94a3b8" font-size="11">les erreurs répétées et les pertes invisibles.</text>
      <text x="12" y="104" fill="#1098ad" font-size="10.5" font-weight="bold">Objectif : <tspan fill="#e2e8f0" font-weight="normal">Savoir clairement où l'entreprise perd du temps.</tspan></text>
    </g>

    <!-- 2. Conception de solutions -->
    <g transform="translate(30, 250)">
      <rect x="0" y="0" width="314" height="120" rx="10" fill="#ffffff" fill-opacity="0.01" stroke="#ffffff" stroke-opacity="0.04" />
      <rect x="12" y="12" width="22" height="22" rx="4" fill="#1098ad" fill-opacity="0.15" />
      <text x="23" y="28" fill="#1098ad" font-size="11" font-weight="bold" text-anchor="middle">2</text>
      <text x="44" y="28" fill="#ffffff" font-size="13" font-weight="bold">Conception de solutions</text>
      <text x="12" y="50" fill="#94a3b8" font-size="11">Nous transformons vos besoins en solutions concrètes : outils</text>
      <text x="12" y="66" fill="#94a3b8" font-size="11">internes, tableaux de suivi, automatisations, systèmes de</text>
      <text x="12" y="82" fill="#94a3b8" font-size="11">gestion, assistants IA ou applications métiers.</text>
      <text x="12" y="104" fill="#1098ad" font-size="10.5" font-weight="bold">Objectif : <tspan fill="#e2e8f0" font-weight="normal">Créer un système utile et adapté à votre travail.</tspan></text>
    </g>

    <!-- 3. Mise en place -->
    <g transform="translate(30, 385)">
      <rect x="0" y="0" width="314" height="120" rx="10" fill="#ffffff" fill-opacity="0.01" stroke="#ffffff" stroke-opacity="0.04" />
      <rect x="12" y="12" width="22" height="22" rx="4" fill="#0ca678" fill-opacity="0.15" />
      <text x="23" y="28" fill="#0ca678" font-size="11" font-weight="bold" text-anchor="middle">3</text>
      <text x="44" y="28" fill="#ffffff" font-size="13" font-weight="bold">Mise en place</text>
      <text x="12" y="50" fill="#94a3b8" font-size="11">Nous installons, configurons et testons les solutions avec</text>
      <text x="12" y="66" fill="#94a3b8" font-size="11">vos équipes. Le but n'est pas de livrer un outil compliqué,</text>
      <text x="12" y="82" fill="#94a3b8" font-size="11">mais un système que les utilisateurs adoptent réellement.</text>
      <text x="12" y="104" fill="#1098ad" font-size="10.5" font-weight="bold">Objectif : <tspan fill="#e2e8f0" font-weight="normal">Passer du problème à un outil qui fonctionne.</tspan></text>
    </g>

    <!-- 4. Suivi et amélioration -->
    <g transform="translate(30, 520)">
      <rect x="0" y="0" width="314" height="120" rx="10" fill="#ffffff" fill-opacity="0.01" stroke="#ffffff" stroke-opacity="0.04" />
      <rect x="12" y="12" width="22" height="22" rx="4" fill="#7048e8" fill-opacity="0.15" />
      <text x="23" y="28" fill="#7048e8" font-size="11" font-weight="bold" text-anchor="middle">4</text>
      <text x="44" y="28" fill="#ffffff" font-size="13" font-weight="bold">Suivi et amélioration</text>
      <text x="12" y="50" fill="#94a3b8" font-size="11">Après la mise en place, nous suivons les résultats,</text>
      <text x="12" y="66" fill="#94a3b8" font-size="11">corrigeons les blocages et améliorons le système selon</text>
      <text x="12" y="82" fill="#94a3b8" font-size="11">l'évolution de votre activité.</text>
      <text x="12" y="104" fill="#1098ad" font-size="10.5" font-weight="bold">Objectif : <tspan fill="#e2e8f0" font-weight="normal">Garder un outil vivant, utile et rentable.</tspan></text>
    </g>
  </g>

  <!-- ==================== VOLET 6 : FUITES, BÉNÉFICES, PROMESSE & PHILOSOPHIE (À DROITE) ==================== -->
  <g transform="translate(748.66, 0)">
    <!-- Fuites Opérationnelles Éliminées -->
    <text x="30" y="64" fill="#ffffff" font-size="15" font-weight="bold" letter-spacing="0.5">🔍 Les fuites éliminées</text>
    <line x1="30" y1="78" x2="344" y2="78" stroke="#f03e3e" stroke-opacity="0.2" stroke-width="2" />
    
    <g transform="translate(30, 95)" font-size="10.5" fill="#e2e8f0">
      <!-- Item 1 -->
      <circle cx="4" cy="5" r="3" fill="#f03e3e" />
      <text x="14" y="9" font-weight="500">Trop de temps perdu à remplir, recopier ou</text>
      <text x="14" y="22" font-weight="500">chercher des informations.</text>

      <!-- Item 2 -->
      <circle cx="4" cy="40" r="3" fill="#f03e3e" />
      <text x="14" y="44" font-weight="500">Suivi des clients, ventes, paiements ou</text>
      <text x="14" y="57" font-weight="500">projets mal organisé.</text>

      <!-- Item 3 -->
      <circle cx="4" cy="75" r="3" fill="#f03e3e" />
      <text x="14" y="79" font-weight="500">Documents dispersés entre WhatsApp,</text>
      <text x="14" y="92" font-weight="500">Excel, emails et papiers.</text>

      <!-- Item 4 -->
      <circle cx="4" cy="110" r="3" fill="#f03e3e" />
      <text x="14" y="114" font-weight="500">Manque de visibilité sur les tâches,</text>
      <text x="14" y="127" font-weight="500">les responsabilités et les délais.</text>

      <!-- Item 5 -->
      <circle cx="4" cy="145" r="3" fill="#f03e3e" />
      <text x="14" y="149" font-weight="500">Processus internes dépendants d'une</text>
      <text x="14" y="162" font-weight="500">seule personne.</text>

      <!-- Item 6 -->
      <circle cx="4" cy="180" r="3" fill="#f03e3e" />
      <text x="14" y="184" font-weight="500">Données importantes difficiles à exploiter</text>
      <text x="14" y="197" font-weight="500">pour prendre des décisions.</text>
    </g>

    <!-- Les bénéfices réels -->
    <text x="30" y="325" fill="#ffffff" font-size="15" font-weight="bold" letter-spacing="0.5">📈 Les bénéfices réels</text>
    <line x1="30" y1="339" x2="344" y2="339" stroke="#0ca678" stroke-opacity="0.2" stroke-width="2" />
    
    <g transform="translate(30, 355)" font-size="10.8" fill="#e2e8f0">
      <!-- Item 1 -->
      <circle cx="4" cy="5" r="3" fill="#0ca678" />
      <text x="14" y="9" font-weight="bold">Une organisation plus claire.</text>

      <!-- Item 2 -->
      <circle cx="4" cy="25" r="3" fill="#0ca678" />
      <text x="14" y="29" font-weight="bold">Des tâches répétitives réduites.</text>

      <!-- Item 3 -->
      <circle cx="4" cy="45" r="3" fill="#0ca678" />
      <text x="14" y="49" font-weight="bold">Une meilleure visibilité sur les activités.</text>

      <!-- Item 4 -->
      <circle cx="4" cy="65" r="3" fill="#0ca678" />
      <text x="14" y="69" font-weight="bold">Moins d'erreurs dans le suivi quotidien.</text>

      <!-- Item 5 -->
      <circle cx="4" cy="85" r="3" fill="#0ca678" />
      <text x="14" y="89" font-weight="bold">Des équipes qui travaillent avec moins de fatigue.</text>

      <!-- Item 6 -->
      <circle cx="4" cy="105" r="3" fill="#0ca678" />
      <text x="14" y="109" font-weight="bold">Des décisions appuyées par des infos structurées.</text>
    </g>

    <!-- Notre promesse de marque -->
    <rect x="30" y="490" width="314" height="110" rx="10" fill="url(#primary-grad)" fill-opacity="0.08" stroke="url(#primary-grad)" stroke-opacity="0.15" />
    <path d="M 42,505 L 42,585" stroke="url(#primary-grad)" stroke-width="3" stroke-linecap="round" />
    <g transform="translate(52, 490)">
      <text x="0" y="25" fill="#ffffff" font-size="12" font-weight="bold">✨ NOTRE PROMESSE DE MARQUE</text>
      <text x="0" y="46" fill="#e2e8f0" font-size="10.8" font-weight="500">Opays Tech aide les entreprises à clarifier,</text>
      <text x="0" y="61" fill="#e2e8f0" font-size="10.8" font-weight="500">simplifier et automatiser leurs opérations</text>
      <text x="0" y="76" fill="#e2e8f0" font-size="10.8" font-weight="500">grâce à des solutions numériques et IA</text>
      <text x="0" y="91" fill="#e2e8f0" font-size="10.8" font-weight="500">adaptées à leur réalité.</text>
    </g>

    <!-- Notre philosophie d'action -->
    <rect x="30" y="615" width="314" height="115" rx="10" fill="url(#accent-grad)" fill-opacity="0.05" stroke="url(#accent-grad)" stroke-opacity="0.15" />
    <path d="M 42,630 L 42,710" stroke="url(#accent-grad)" stroke-width="3" stroke-linecap="round" />
    <g transform="translate(52, 615)">
      <text x="0" y="25" fill="#ffffff" font-size="12" font-weight="bold">🎯 NOTRE PHILOSOPHIE D'ACTION</text>
      <text x="0" y="46" fill="#94a3b8" font-size="10.8" font-style="italic">"Avant d'ajouter un nouvel outil, il faut d'abord</text>
      <text x="0" y="61" fill="#94a3b8" font-size="10.8" font-style="italic">comprendre où l'entreprise perd son énergie."</text>
      <text x="0" y="82" fill="#e2e8f0" font-size="10.8" font-weight="bold">Opays Tech commence par identifier la fuite.</text>
      <text x="0" y="97" fill="#e2e8f0" font-size="10.8" font-weight="bold">Ensuite, nous construisons le système.</text>
    </g>
  </g>
</svg>
